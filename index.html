<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div class="container">

        <div class="caixa-login" id="tela-login">

            <div class="titulo">
                <h1>Entrar</h1>
                <p>Bem-vindo de volta</p>
            </div>

            <div class="grupo-input">
                <label>Usuário</label>

                <div class="caixa-input">
                    <i class="fa-regular fa-user"></i>

                    <input type="text" id="usuario-login" placeholder="Digite seu usuário">
                </div>
            </div>

            <div class="grupo-input">
                <label>Senha</label>

                <div class="caixa-input">
                    <i class="fa-solid fa-lock"></i>

                    <input type="password" id="senha-login" placeholder="Digite sua senha">

                    <i class="fa-regular fa-eye olho"
                    onclick="mostrarSenha('senha-login', this)"></i>
                </div>
            </div>

            <div class="opcoes">

                <label class="lembrar-login">
                    <input type="checkbox">
                    <span>Lembrar login</span>
                </label>

                <a href="#" class="esqueci">Esqueci minha senha</a>

            </div>

            <button onclick="entrar()">Entrar</button>

            <div class="cadastro">
                Não tem uma conta?
                <a href="#" onclick="abrirCadastro()">Criar conta</a>
            </div>

        </div>

        <div class="caixa-login esconder" id="tela-cadastro">

            <div class="titulo">
                <h1>Criar Conta</h1>
                <p>Crie seu acesso</p>
            </div>

            <div class="grupo-input">
                <label>Usuário</label>

                <div class="caixa-input">
                    <i class="fa-regular fa-user"></i>

                    <input type="text" id="usuario-cadastro" placeholder="Crie um usuário">
                </div>
            </div>

            <div class="grupo-input">
                <label>Senha</label>

                <div class="caixa-input">
                    <i class="fa-solid fa-lock"></i>

                    <input type="password" id="senha-cadastro" placeholder="Crie uma senha">

                    <i class="fa-regular fa-eye olho"
                    onclick="mostrarSenha('senha-cadastro', this)"></i>
                </div>
            </div>

            <button onclick="criarConta()">Criar Conta</button>

            <div class="cadastro">
                Já tem uma conta?
                <a href="#" onclick="abrirLogin()">Entrar</a>
            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
